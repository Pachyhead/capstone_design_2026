// protocol buffer(protobuf) interface
// : define RPC methods and message types
syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.grpc.examples.routeguide";
option java_outer_classname = "RouteGuideProto";
option objc_class_prefix = "RTG";

package routeguide;

// Interface exported by the server.
service RouteGuide { // definition of service
  // Codelab Hint: Define RPC methods here
  rpc GetFeature(Point) returns (Feature) {} // return Feature paired with client's Point
}

// message type: data structure that clients send to server
message Point { 
  // Codelab Hint: Define the Point messages here
  int32 latitude = 1; // 1, 2: unique id for each field of message type
  int32 longitude = 2;	
}

// message type: data structure that clients receive from server
message Feature {
  // Codelab Hint: Define the Feature messages here
  
  // name or address of feature.
  string name = 1;

  // point where the feature is located.
  Point location = 2;
}
