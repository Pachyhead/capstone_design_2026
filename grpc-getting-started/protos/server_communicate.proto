// protocol buffer(protobuf) interface
// : define RPC methods and message types
syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.grpc.examples.routeguide";
option java_outer_classname = "RouteGuideProto";
option objc_class_prefix = "RTG";


// Interface exported by the server.
service SpeechRelay { // definition of service
  // Codelab Hint: Define RPC methods here

  // 송신측 -> 서버: 텍스트, 감정 데이터
  rpc UploadSpeechTask(SpeechUploadRequest) returns (UploadStatus) {} // 성공 여부 반환
  
  // 서버 -> 수신측: 합성된 음성 데이터
  rpc SubscribeSpeechStream(UserIdentifier) returns (stream AudioFrame) {}
}

// message type: data structure that send_clients send to server
message SpeechUploadRequest { 
  // Codelab Hint: Define the SpeechUploadRequest messages here
  
  string sender_id = 1; // 1, 2, 3, 4: unique id for each field of message type
  string receiver_id = 2;	
  string text = 3;
  repeated float emotion_vector = 4;
}
// message type: data structure that send_clients receive from server
message UploadStatus {
  bool accepted = 1;
}

// message type: data structure that recv_clients send to server
message UserIdentifier {
  // Codelab Hint: Define the UserIdentifier messages here
  string user_id = 1; // 수신측 id
}
// message type: data structure that recv_clients receive from server
message AudioFrame {
  bytes audio_content = 1;
  string sender_id = 2;
  string message_id = 3;
  bool is_final = 4; // 마지막 조각인지
}