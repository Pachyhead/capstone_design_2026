// protocol buffer(protobuf) interface
// : define RPC methods and message types
syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.grpc.examples.routeguide";
option java_outer_classname = "RouteGuideProto";
option objc_class_prefix = "RTG";

import "google/protobuf/timestamp.proto";


// Interface exported by the server.
service SpeechRelay { // definition of service
  // Codelab Hint: Define RPC methods here

  // 송신측 -> 서버: 텍스트, 감정 데이터(전송 로직)
  rpc Send(SpeechUploadRequest) returns (UploadStatus) {} // 성공 여부 반환
  
  // 서버 -> 수신측: 메타데이터(접속 로직)
  rpc GetPendingMessages(UserIdentifier) returns (MetadataResponse) {}

  // 서버 -> 수신측: 합성된 음성 데이터(재생 로직)
  rpc GetVoice(MessageIdentifier) returns (stream AudioFrame) {}
}

// message type: data structure that send_clients send to server
message SpeechUploadRequest { 
  // Codelab Hint: Define the SpeechUploadRequest messages here
  
  string sender_id = 1; // 1, 2, 3, 4, 5: unique id for each field of message type
  string receiver_id = 2;	
  string message = 3;
  int32 emo_type = 4;
  repeated float emotion_vector = 5;
}
// message type: data structure that send_clients receive from server
message UploadStatus {
  bool accepted = 1;
}

// message type: data structure that recv_clients send to server to get metadata(접속로직)
message UserIdentifier {
  // Codelab Hint: Define the UserIdentifier messages here
  string user_id = 1; // 수신측 id
}
// message type: data structure that recv_clients receive from server(접속로직)
// single return
message MetadataItem {
  string message_id = 1;
  string sender_id = 2;
  string message = 3;
  int32 emo_type = 4;
  google.protobuf.Timestamp send_time = 5; // Datetime
}
// message type: data structure that recv_clients receive from server
// multiple return
message MetadataResponse {
  repeated MetadataItem items = 1; // 여러 MetadataItem 담는 리스트
}

// message type: data structure that recv_clients send to server to get audio(재생로직)
message MessageIdentifier {
  string message_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
}
// message type: data structure that recv_clients receive from server(재생로직)
message AudioFrame {
  bytes audio_content = 1;
  string sender_id = 2;
  string message_id = 3;
  bool is_final = 4; // 마지막 조각인지
}